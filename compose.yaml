name: twitch-drop-automator

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-app-image: &app-image twitch-drop-automator-app:local

services:
  app:
    image: *app-image
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ALLOW_REGISTRATION: "0"
      AUTO_RESUME_ENABLED: "1"
      BOOTSTRAP_TOKEN: "${BOOTSTRAP_TOKEN:?BOOTSTRAP_TOKEN must be set in .env}"
      DATA_DIR: /data
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER:-twitch}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/${POSTGRES_DB:-twitch_drops}"
      DISPLAY: ":99"
      MAX_AUTOMATORS: "1"
      PORT: "5000"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set in .env}"
    ports:
      - "${BIND_ADDRESS:?BIND_ADDRESS must be set in .env}:${PORT:-5000}:5000/tcp"
    volumes:
      - browser_data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health/ready', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp_profile.json
    cap_drop:
      - ALL
    cap_add:
      - SYS_CHROOT
    mem_limit: 4g
    mem_reservation: 1g
    pids_limit: 512
    stop_grace_period: 60s
    restart: unless-stopped
    logging: *default-logging

  data-init:
    image: *app-image
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
      - chown -R 10001:10001 /data
    volumes:
      - browser_data:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    pids_limit: 64
    restart: "no"
    logging: *default-logging

  db:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-twitch_drops}"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
      POSTGRES_USER: "${POSTGRES_USER:-twitch}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    init: true
    mem_limit: 1g
    mem_reservation: 256m
    pids_limit: 256
    stop_grace_period: 60s
    restart: unless-stopped
    logging: *default-logging

volumes:
  browser_data:
    name: twitch-drop-automator_browser_data
  postgres_data:
    name: twitch-drop-automator_postgres_data
