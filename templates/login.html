{% extends "base.html" %}
{% block title %}Log In — Twitch Drop Automator{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Log in to manage your Twitch drop automation</p>
    <form method="POST" autocomplete="on">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus
               placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>
    {% if registration_open %}
    <p class="auth-link">First time here? <a href="{{ url_for('auth.register') }}">Create the owner account</a></p>
    {% endif %}
  </div>
</div>
{% endblock %}
